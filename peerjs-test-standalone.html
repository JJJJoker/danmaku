<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PeerJS 连通性测试 - 独立版</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 30px auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .section {
            margin: 20px 0;
            padding: 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            background: #fafafa;
        }
        .section h2 {
            margin-top: 0;
            color: #667eea;
            font-size: 18px;
        }
        .status {
            padding: 12px;
            margin: 15px 0;
            border-radius: 8px;
            font-weight: bold;
            text-align: center;
        }
        .status.connected {
            background: #d4edda;
            color: #155724;
            border: 2px solid #c3e6cb;
        }
        .status.disconnected {
            background: #f8d7da;
            color: #721c24;
            border: 2px solid #f5c6cb;
        }
        .status.connecting {
            background: #fff3cd;
            color: #856404;
            border: 2px solid #ffeaa7;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            margin: 5px;
            font-size: 14px;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            opacity: 0.6;
        }
        input[type="text"] {
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            width: 300px;
            font-size: 14px;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }
        .log {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 12px;
            max-height: 400px;
            overflow-y: auto;
            margin-top: 15px;
            line-height: 1.6;
        }
        .log-entry {
            margin: 5px 0;
            padding: 5px;
            border-left: 3px solid transparent;
        }
        .log-entry.error {
            color: #f48771;
            border-left-color: #f48771;
            background: rgba(244, 135, 113, 0.1);
        }
        .log-entry.success {
            color: #89d185;
            border-left-color: #89d185;
            background: rgba(137, 209, 133, 0.1);
        }
        .log-entry.info {
            color: #67b7f7;
            border-left-color: #67b7f7;
            background: rgba(103, 183, 247, 0.1);
        }
        .log-entry.warning {
            color: #cca700;
            border-left-color: #cca700;
            background: rgba(204, 167, 0, 0.1);
        }
        .room-id-display {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            word-break: break-all;
        }
        .instructions {
            background: #e7f3ff;
            border-left: 4px solid #2196F3;
            padding: 15px;
            margin: 15px 0;
            border-radius: 5px;
        }
        .instructions ol {
            margin: 10px 0;
            padding-left: 20px;
        }
        .instructions li {
            margin: 8px 0;
            line-height: 1.6;
        }
        .clear-btn {
            background: #dc3545;
            margin-top: 10px;
        }
        .clear-btn:hover:not(:disabled) {
            background: #c82333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔗 PeerJS 连通性测试工具</h1>
        <p class="subtitle">独立版本 - 无需服务器,直接双击打开即可使用 | 已配置免费TURN中继</p>
        
        <div class="instructions">
            <strong>📋 使用说明:</strong>
            <ol>
                <li><strong>主机方</strong>: 点击"创建房间" → 复制生成的房间ID → 发送给客户端</li>
                <li><strong>客户端</strong>: 输入房间ID → 点击"加入房间"</li>
                <li><strong>双方</strong>: 连接成功后可以发送测试消息验证双向通信</li>
            </ol>
        </div>

        <div class="section">
            <h2>📡 步骤1: 创建测试房间 (主机)</h2>
            <button id="createBtn" onclick="createRoom()">创建房间</button>
            <div id="hostStatus" class="status disconnected">状态: 未连接</div>
            <div id="roomIdDisplay" style="display: none;"></div>
        </div>

        <div class="section">
            <h2>🔌 步骤2: 加入房间 (客户端)</h2>
            <input type="text" id="roomIdInput" placeholder="输入房间ID (例如: test-abc123)">
            <button id="joinBtn" onclick="joinRoom()">加入房间</button>
            <div id="clientStatus" class="status disconnected">状态: 未连接</div>
        </div>

        <div class="section">
            <h2>💬 步骤3: 发送测试消息</h2>
            <button id="sendBtn" onclick="sendMessage()" disabled>发送测试消息</button>
            <div id="messageStatus"></div>
        </div>

        <div class="section">
            <h2>📝 日志输出</h2>
            <div id="log" class="log"></div>
            <button class="clear-btn" onclick="clearLog()">清空日志</button>
        </div>
    </div>

    <!-- PeerJS 库 (使用本地文件) -->
    <script src="peerjs-bundled.js"></script>
    
    <script>
        let hostPeer = null;
        let clientPeer = null;
        let hostConnection = null;
        let clientConnection = null;
        let currentRoomId = '';

        function addLog(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            const timestamp = new Date().toLocaleTimeString();
            entry.textContent = `[${timestamp}] ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
            
            // 同时输出到浏览器控制台
            if (type === 'error') console.error(message);
            else if (type === 'success') console.log('✅', message);
            else if (type === 'warning') console.warn('⚠️', message);
            else console.log('ℹ️', message);
        }

        function clearLog() {
            document.getElementById('log').innerHTML = '';
            addLog('日志已清空', 'info');
        }

        function updateStatus(elementId, status, message) {
            const element = document.getElementById(elementId);
            element.className = `status ${status}`;
            element.textContent = `状态: ${message}`;
        }

        function createRoom() {
            if (hostPeer) {
                addLog('⚠️ 主机已存在,请刷新页面重新创建', 'warning');
                return;
            }

            // 生成随机房间ID
            const randomId = Math.random().toString(36).substring(2, 8);
            currentRoomId = `test-${randomId}`;
            const hostId = `${currentRoomId}_host`;

            addLog(`正在创建房间: ${currentRoomId}`, 'info');
            updateStatus('hostStatus', 'connecting', '连接中...');

            try {
                hostPeer = new Peer(hostId, {
                    host: '0.peerjs.com',
                    port: 443,
                    secure: true,
                    debug: 2,
                    config: {
                        iceServers: [
                            // STUN 服务器
                            { urls: 'stun:stun.l.google.com:19302' },
                            { urls: 'stun:stun1.l.google.com:19302' },
                            { urls: 'stun:stun2.l.google.com:19302' },
                            // 免费公共 TURN 服务器
                            { 
                                urls: 'turn:openrelay.metered.ca:80',
                                username: 'openrelayproject',
                                credential: 'openrelayproject'
                            },
                            {
                                urls: 'turn:openrelay.metered.ca:443',
                                username: 'openrelayproject',
                                credential: 'openrelayproject'
                            },
                            {
                                urls: 'turn:openrelay.metered.ca:443?transport=tcp',
                                username: 'openrelayproject',
                                credential: 'openrelayproject'
                            }
                        ],
                    },
                });

                hostPeer.on('open', (id) => {
                    addLog(`✅ 主机创建成功! ID: ${id}`, 'success');
                    updateStatus('hostStatus', 'connected', '已连接 - 等待客户端加入');
                    
                    const roomIdDisplay = document.getElementById('roomIdDisplay');
                    roomIdDisplay.style.display = 'block';
                    roomIdDisplay.innerHTML = `
                        <div class="room-id-display">
                            <div style="font-size: 14px; margin-bottom: 10px;">📋 房间ID (复制发给朋友):</div>
                            <div style="font-size: 24px; letter-spacing: 2px;">${currentRoomId}</div>
                        </div>
                    `;
                    addLog(`请将房间ID "${currentRoomId}" 告诉你的朋友`, 'info');
                });

                hostPeer.on('connection', (conn) => {
                    addLog(`📞 收到客户端连接请求 from: ${conn.peer}`, 'info');
                    
                    conn.on('open', () => {
                        addLog(`✅ 客户端连接成功! Peer: ${conn.peer}`, 'success');
                        hostConnection = conn;
                        document.getElementById('sendBtn').disabled = false;
                        
                        // 发送欢迎消息
                        conn.send({ type: 'welcome', message: 'Hello from Host!', timestamp: new Date().toISOString() });
                        addLog('📤 已发送欢迎消息给客户端', 'info');
                    });

                    conn.on('data', (data) => {
                        addLog(`📨 收到客户端消息: ${JSON.stringify(data)}`, 'success');
                    });

                    conn.on('close', () => {
                        addLog('❌ 客户端断开连接', 'error');
                        hostConnection = null;
                        document.getElementById('sendBtn').disabled = true;
                        updateStatus('hostStatus', 'disconnected', '客户端已断开');
                    });

                    conn.on('error', (err) => {
                        addLog(`❌ 连接错误: ${err.message}`, 'error');
                    });
                });

                hostPeer.on('error', (err) => {
                    addLog(`❌ 主机错误: ${err.type} - ${err.message}`, 'error');
                    updateStatus('hostStatus', 'disconnected', '连接失败');
                });

                hostPeer.on('disconnected', () => {
                    addLog('⚠️ 主机与信令服务器断开,尝试重连...', 'warning');
                    hostPeer.reconnect();
                });

            } catch (err) {
                addLog(`❌ 创建主机失败: ${err.message}`, 'error');
                updateStatus('hostStatus', 'disconnected', '创建失败');
            }
        }

        function joinRoom() {
            if (clientPeer) {
                addLog('⚠️ 客户端已存在,请刷新页面重新加入', 'warning');
                return;
            }

            const roomId = document.getElementById('roomIdInput').value.trim();
            if (!roomId) {
                addLog('❌ 请输入房间ID', 'error');
                return;
            }

            const clientId = `${roomId}_client_${Math.random().toString(36).substring(2, 6)}`;
            const hostId = `${roomId}_host`;

            addLog(`正在加入房间: ${roomId}`, 'info');
            updateStatus('clientStatus', 'connecting', '连接中...');

            try {
                clientPeer = new Peer(clientId, {
                    host: '0.peerjs.com',
                    port: 443,
                    secure: true,
                    debug: 2,
                    config: {
                        iceServers: [
                            // STUN 服务器
                            { urls: 'stun:stun.l.google.com:19302' },
                            { urls: 'stun:stun1.l.google.com:19302' },
                            { urls: 'stun:stun2.l.google.com:19302' },
                            // 免费公共 TURN 服务器
                            { 
                                urls: 'turn:openrelay.metered.ca:80',
                                username: 'openrelayproject',
                                credential: 'openrelayproject'
                            },
                            {
                                urls: 'turn:openrelay.metered.ca:443',
                                username: 'openrelayproject',
                                credential: 'openrelayproject'
                            },
                            {
                                urls: 'turn:openrelay.metered.ca:443?transport=tcp',
                                username: 'openrelayproject',
                                credential: 'openrelayproject'
                            }
                        ],
                    },
                });

                clientPeer.on('open', () => {
                    addLog(`✅ 客户端Peer创建成功: ${clientId}`, 'success');
                    
                    addLog(`正在连接到主机: ${hostId}`, 'info');
                    clientConnection = clientPeer.connect(hostId, {
                        reliable: true,
                        metadata: { clientId: clientId }
                    });

                    clientConnection.on('open', () => {
                        addLog(`✅ 成功连接到主机!`, 'success');
                        updateStatus('clientStatus', 'connected', '已连接');
                        document.getElementById('sendBtn').disabled = false;
                        
                        // 发送问候消息
                        clientConnection.send({ type: 'hello', message: 'Hello from Client!', timestamp: new Date().toISOString() });
                        addLog('📤 已发送问候消息给主机', 'info');
                    });

                    clientConnection.on('data', (data) => {
                        addLog(`📨 收到主机消息: ${JSON.stringify(data)}`, 'success');
                    });

                    clientConnection.on('close', () => {
                        addLog('❌ 与主机断开连接', 'error');
                        updateStatus('clientStatus', 'disconnected', '已断开');
                        clientConnection = null;
                        document.getElementById('sendBtn').disabled = true;
                    });

                    clientConnection.on('error', (err) => {
                        addLog(`❌ 连接错误: ${err.message}`, 'error');
                        updateStatus('clientStatus', 'disconnected', '连接失败');
                    });
                });

                clientPeer.on('error', (err) => {
                    addLog(`❌ 客户端错误: ${err.type} - ${err.message}`, 'error');
                    updateStatus('clientStatus', 'disconnected', '连接失败');
                });

                clientPeer.on('disconnected', () => {
                    addLog('⚠️ 客户端与信令服务器断开,尝试重连...', 'warning');
                    clientPeer.reconnect();
                });

            } catch (err) {
                addLog(`❌ 加入房间失败: ${err.message}`, 'error');
                updateStatus('clientStatus', 'disconnected', '加入失败');
            }
        }

        function sendMessage() {
            const message = {
                type: 'test',
                timestamp: new Date().toISOString(),
                data: 'Test message at ' + new Date().toLocaleTimeString()
            };

            let sent = false;

            if (hostConnection && hostConnection.open) {
                hostConnection.send(message);
                addLog('📤 主机发送测试消息', 'info');
                sent = true;
            }

            if (clientConnection && clientConnection.open) {
                clientConnection.send(message);
                addLog('📤 客户端发送测试消息', 'info');
                sent = true;
            }

            if (sent) {
                document.getElementById('messageStatus').innerHTML = 
                    '<div style="color: green; margin-top: 10px;">✅ 消息已发送,请查看对方是否收到</div>';
            } else {
                document.getElementById('messageStatus').innerHTML = 
                    '<div style="color: red; margin-top: 10px;">❌ 没有可用的连接</div>';
            }
        }

        // 页面加载完成提示
        window.onload = () => {
            // 检查 PeerJS 是否加载成功
            if (typeof Peer === 'undefined') {
                addLog('❌ PeerJS 库加载失败! 请检查网络连接', 'error');
                addLog('💡 解决方案:', 'warning');
                addLog('1. 确保你的网络可以访问 cdn.bootcdn.net 或 lib.baomitu.com', 'warning');
                addLog('2. 如果仍然无法访问,请切换到手机热点测试', 'warning');
                addLog('3. 按F12打开浏览器控制台查看详细错误信息', 'warning');
                return;
            }
            
            addLog('🚀 PeerJS 连通性测试工具已就绪', 'success');
            addLog('📋 已配置免费TURN中继服务器,支持严格NAT环境', 'info');
            addLog('请按以下步骤操作:', 'info');
            addLog('1. 主机方点击"创建房间"', 'info');
            addLog('2. 将生成的房间ID发送给客户端', 'info');
            addLog('3. 客户端输入ID并点击"加入房间"', 'info');
            addLog('4. 连接成功后点击"发送测试消息"验证', 'info');
        };

        // 页面卸载时清理
        window.onbeforeunload = () => {
            if (hostPeer) hostPeer.destroy();
            if (clientPeer) clientPeer.destroy();
        };
    </script>
</body>
</html>
