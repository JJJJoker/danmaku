name: Release

# 合并即发版：push 到 main 时若 package.json 版本号没有对应的已发布 Release，
# 自动打 tag → 建草稿 Release → 双平台构建上传 → 资产齐全后草稿翻正式。
# 所有 job 都在 test 之后（测试红 = 不发版）；日常合并不改版本号时，跑完测试后 prepare 几秒即结束。
on:
  push:
    branches: [main]
  workflow_dispatch: # 构建失败后可手动重跑（草稿未发布时会继续补齐资产并发布）

permissions:
  contents: write

# 防止两次合并接连触发的并发发版
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # 发版门禁：测试挂了就不打 tag、不建草稿、不发版。
  # 与 build.yml 的 test job 同款，两处保持同步（不值得为此抽 composite action）
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            danmaku-server/package-lock.json

      - name: 安装客户端依赖
        run: npm ci
        env:
          # 测试用不到 electron 二进制，跳过 ~100MB 下载
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'

      - name: 客户端单元测试（vitest）
        run: npm test

      - name: 安装服务器依赖
        run: npm ci
        working-directory: danmaku-server

      - name: 服务器编译冒烟（tsc）
        run: npm run build
        working-directory: danmaku-server

      - name: 服务器单元与集成测试（vitest）
        run: npm test
        working-directory: danmaku-server

  prepare:
    name: Prepare release
    # 必须卡在 prepare 之前：prepare 会打 tag、建草稿 Release，测试红了不能把坏 commit 定格进 tag
    needs: test
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: 判断是否需要发版
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          # 已存在同版本的正式 Release → 跳过；草稿仍在或无 Release → 继续（支持失败重跑）
          IS_DRAFT=$(gh release view "v$VERSION" --json isDraft -q .isDraft 2>/dev/null || echo "missing")
          if [ "$IS_DRAFT" = "false" ]; then
            echo "Release v$VERSION 已正式发布，跳过发版"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

      - name: 版本一致性校验（package.json / lock / README / 更新日志）
        if: steps.check.outputs.should_release == 'true'
        run: node scripts/bump-version.js --check

      - name: 创建 tag（幂等）
        if: steps.check.outputs.should_release == 'true'
        run: |
          TAG="v${{ steps.check.outputs.version }}"
          # 用 GITHUB_TOKEN 推的 tag 不会触发其他 workflow（GitHub 防递归），发版逻辑都在本 workflow 内
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "tag $TAG 已存在，跳过创建"
          else
            git tag "$TAG" "$GITHUB_SHA"
            git push origin "$TAG"
          fi

      - name: 预建草稿 Release（幂等）
        if: steps.check.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.check.outputs.version }}"
          # 预建草稿：消除双平台 job 并发各建一个 release 的竞态；
          # --generate-notes 从合并的 PR 自动生成更新说明（即客户端"更新说明摘要"的来源）
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG 草稿已存在，跳过创建"
          else
            gh release create "$TAG" --draft --verify-tag --title "$TAG" --generate-notes
          fi

  release-windows:
    name: Release Windows
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup and build
        uses: ./.github/actions/setup-build
        env:
          VITE_DANMAKU_SERVER_URL: ${{ vars.DANMAKU_SERVER_URL }}
          # 自建更新源地址（generic feed），为空时客户端纯走 GitHub Releases
          DANMAKU_UPDATE_URL: ${{ vars.DANMAKU_UPDATE_URL }}

      - name: 构建并上传到草稿 Release
        run: npx electron-builder --win --x64 --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 覆盖 .npmrc 里的国内镜像（npmmirror 的 NSIS 工具包会返回坏内容导致校验失败），CI 直连官方源
          NPM_CONFIG_ELECTRON_BUILDER_BINARIES_MIRROR: https://github.com/electron-userland/electron-builder-binaries/releases/download/

  release-macos:
    name: Release macOS
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup and build
        uses: ./.github/actions/setup-build
        env:
          VITE_DANMAKU_SERVER_URL: ${{ vars.DANMAKU_SERVER_URL }}
          # 自建更新源地址（generic feed），为空时客户端纯走 GitHub Releases
          DANMAKU_UPDATE_URL: ${{ vars.DANMAKU_UPDATE_URL }}

      - name: 构建并上传到草稿 Release
        run: npx electron-builder --mac --arm64 --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_ELECTRON_BUILDER_BINARIES_MIRROR: https://github.com/electron-userland/electron-builder-binaries/releases/download/

  publish:
    name: Publish release
    needs: [prepare, release-windows, release-macos]
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: 校验资产齐全后发布（草稿翻正式）
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          TAG="v${{ needs.prepare.outputs.version }}"
          ASSETS=$(gh release view "$TAG" --json assets -q '.assets[].name')
          echo "已上传资产："
          echo "$ASSETS"
          # 按名字断言更新链路的关键资产：缺 latest.yml 或安装包会让全体客户端更新 404，
          # 数量校验兜不住"数量够但缺关键文件"的情况
          MISSING=""
          for pattern in '^latest\.yml$' '^latest-mac\.yml$' '\-win-x64\.exe$' '\-win-x64\.exe\.blockmap$' '\-win-x64\.zip$' '\-mac-arm64\.dmg$' '\-mac-arm64\.zip$'; do
            echo "$ASSETS" | grep -qE "$pattern" || MISSING="$MISSING $pattern"
          done
          if [ -n "$MISSING" ]; then
            echo "::error::缺少关键资产：$MISSING，不发布，请检查构建产物"
            exit 1
          fi
          gh release edit "$TAG" --draft=false --latest
          echo "Release $TAG 已发布"

  # 把发版资产同步到自建更新服务器（客户端 generic 更新源，国内下载快）。
  # 放在 GitHub 正式发布之后：本 job 失败只影响自建源（客户端自动回退 GitHub），
  # 不影响已完成的发布。恢复方式：Actions 页 "Re-run failed jobs" 只重跑本 job——
  # 不能整个 workflow 重跑，prepare 会因 Release 已正式发布判 should_release=false 跳过一切。
  upload-update-server:
    name: Upload to update server
    needs: [prepare, publish]
    # DANMAKU_UPDATE_URL 兼作总开关（secrets 不能用于 job 级 if，所以用 var 判断）
    if: needs.prepare.outputs.should_release == 'true' && vars.DANMAKU_UPDATE_URL != ''
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 下载 Release 资产
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          TAG="v${{ needs.prepare.outputs.version }}"
          gh release download "$TAG" --dir assets
          # 与 publish job 同款断言：资产不齐全宁可让本 job 红，也不推半套上服务器
          MISSING=""
          for pattern in '^latest\.yml$' '^latest-mac\.yml$' '\-win-x64\.exe$' '\-win-x64\.exe\.blockmap$' '\-win-x64\.zip$' '\-mac-arm64\.dmg$' '\-mac-arm64\.zip$'; do
            ls assets | grep -qE "$pattern" || MISSING="$MISSING $pattern"
          done
          if [ -n "$MISSING" ]; then
            echo "::error::下载的资产不齐全：$MISSING"
            exit 1
          fi

      - name: 配置 SSH
        env:
          UPDATE_SSH_KEY: ${{ secrets.UPDATE_SSH_KEY }}
          UPDATE_SSH_KNOWN_HOSTS: ${{ secrets.UPDATE_SSH_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$UPDATE_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # host key 由运维本地 ssh-keyscan 一次性产出存 secret（生成方法见 danmaku-server/DEPLOYMENT.md）；
          # 不在 CI 运行时 keyscan——那等于每次都 TOFU，放弃 host 校验
          printf '%s\n' "$UPDATE_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: 上传资产（先二进制后 yml，yml 原子生效）
        env:
          SSH_HOST: ${{ secrets.UPDATE_SSH_HOST }}
          SSH_USER: ${{ secrets.UPDATE_SSH_USER }}
          SSH_PORT: ${{ secrets.UPDATE_SSH_PORT }}
        run: |
          PORT="${SSH_PORT:-22}"
          DEST="$SSH_USER@$SSH_HOST"
          DIR=/opt/danmaku-server/updates
          RSH="ssh -p $PORT -o BatchMode=yes"
          retry() { local i; for i in 1 2 3; do "$@" && return 0; echo "第 $i 次失败，15s 后重试..."; sleep 15; done; return 1; }

          retry $RSH "$DEST" "mkdir -p $DIR"
          # 第一批：二进制 + blockmap。新版本文件名不与线上冲突，直接进目录无窗口期；
          # --partial 保留断传文件供重试续传（Actions → 国内链路慢/断的关键缓解）
          retry rsync -av --partial --timeout=120 -e "$RSH" assets/yundan-* "$DEST:$DIR/"
          # 第二批：yml 先传 .tmp 再远端 rename 原子生效——客户端永远读不到半截 yml，
          # 且 yml 生效时其指向的二进制必然已就位
          retry rsync -av --timeout=120 -e "$RSH" assets/latest.yml "$DEST:$DIR/latest.yml.tmp"
          retry rsync -av --timeout=120 -e "$RSH" assets/latest-mac.yml "$DEST:$DIR/latest-mac.yml.tmp"
          retry $RSH "$DEST" "mv -f $DIR/latest.yml.tmp $DIR/latest.yml && mv -f $DIR/latest-mac.yml.tmp $DIR/latest-mac.yml"

      - name: 清理旧版本（保留最近 3 版）
        env:
          SSH_HOST: ${{ secrets.UPDATE_SSH_HOST }}
          SSH_USER: ${{ secrets.UPDATE_SSH_USER }}
          SSH_PORT: ${{ secrets.UPDATE_SSH_PORT }}
        run: |
          # 保留 3 版兼顾磁盘（每版约 400MB）与差量更新（旧客户端的 blockmap 需在线）
          ssh -p "${SSH_PORT:-22}" -o BatchMode=yes "$SSH_USER@$SSH_HOST" bash -s <<'REMOTE'
          cd /opt/danmaku-server/updates || exit 0
          ls yundan-* 2>/dev/null \
            | sed -E 's/^yundan-(.+)-(win|mac)-.*$/\1/' \
            | sort -uV | head -n -3 \
            | while read -r v; do
                echo "删除旧版本 $v"
                rm -f "yundan-$v"-*
              done
          REMOTE

      - name: 发布后自检
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          UPDATE_URL="${{ vars.DANMAKU_UPDATE_URL }}"
          # latest.yml 已生效且指向新版本
          curl -fsS --max-time 20 "$UPDATE_URL/latest.yml" | grep -q "version: $VERSION" \
            || { echo "::error::自建源 latest.yml 未生效（不是 $VERSION）"; exit 1; }
          # 差量更新依赖的单段 Range 可用
          CODE=$(curl -s -o /dev/null -w '%{http_code}' --max-time 30 \
            -H "Range: bytes=0-0" "$UPDATE_URL/yundan-$VERSION-win-x64.exe")
          [ "$CODE" = "206" ] || { echo "::error::Range 请求返回 $CODE，期望 206"; exit 1; }
          echo "自建更新源已同步至 v$VERSION"
