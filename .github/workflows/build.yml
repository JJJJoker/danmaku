name: Build

# CI 冒烟构建（不发布）。正式发版走 release.yml：合并到 main 且 package.json 版本号变化时自动发 Release
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  # 单元/集成测试（客户端 vitest + danmaku-server vitest），与双平台构建并行。
  # release.yml 里有同款 job（发版门禁卡在 prepare 之前）；两处保持同步，不值得为此抽 composite action
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            danmaku-server/package-lock.json

      - name: 安装客户端依赖
        run: npm ci
        env:
          # 测试用不到 electron 二进制，跳过 ~100MB 下载
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'

      - name: 客户端单元测试（vitest）
        run: npm test

      - name: 安装服务器依赖
        run: npm ci
        working-directory: danmaku-server

      - name: 服务器编译冒烟（tsc）
        run: npm run build
        working-directory: danmaku-server

      - name: 服务器单元与集成测试（vitest）
        run: npm test
        working-directory: danmaku-server

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup and build
        uses: ./.github/actions/setup-build
        env:
          VITE_DANMAKU_SERVER_URL: ${{ vars.DANMAKU_SERVER_URL }}

      - name: Build Windows application
        run: npx electron-builder --win --x64 --publish never
        env:
          # 覆盖 .npmrc 里的国内镜像（npmmirror 的 NSIS 工具包会返回坏内容导致校验失败），CI 直连官方源
          NPM_CONFIG_ELECTRON_BUILDER_BINARIES_MIRROR: https://github.com/electron-userland/electron-builder-binaries/releases/download/
      
      - name: Upload Windows exe
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist-new/win-unpacked/云弹一下.exe
          retention-days: 90
      
      - name: Upload Windows zip
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: dist-new/yundan-*.zip
          retention-days: 90

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist-new/yundan-*.exe
          retention-days: 90

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup and build
        uses: ./.github/actions/setup-build
        env:
          VITE_DANMAKU_SERVER_URL: ${{ vars.DANMAKU_SERVER_URL }}

      - name: Build macOS application (ARM64)
        run: npx electron-builder --mac --arm64 --publish never
        env:
          NPM_CONFIG_ELECTRON_BUILDER_BINARIES_MIRROR: https://github.com/electron-userland/electron-builder-binaries/releases/download/
      
      - name: Zip macOS app
        run: |
          cd dist-new/mac-arm64
          zip -r -y "云弹一下.app.zip" "云弹一下.app"
      
      - name: Upload macOS app
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: dist-new/mac-arm64/云弹一下.app.zip
          retention-days: 90
      
      - name: Upload macOS dmg
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist-new/yundan-*.dmg
          retention-days: 90
