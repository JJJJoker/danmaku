name: Build

# CI 冒烟构建（不发布）。正式发版走 release.yml：合并到 main 且 package.json 版本号变化时自动发 Release
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup and build
        uses: ./.github/actions/setup-build

      - name: Build Windows application
        run: npx electron-builder --win --x64 --publish never
      
      - name: Upload Windows exe
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist-new/win-unpacked/云弹一下.exe
          retention-days: 90
      
      - name: Upload Windows zip
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: dist-new/yundan-*.zip
          retention-days: 90

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist-new/yundan-*.exe
          retention-days: 90

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup and build
        uses: ./.github/actions/setup-build

      - name: Build macOS application (ARM64)
        run: npx electron-builder --mac --arm64 --publish never
      
      - name: Zip macOS app
        run: |
          cd dist-new/mac-arm64
          zip -r -y "云弹一下.app.zip" "云弹一下.app"
      
      - name: Upload macOS app
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: dist-new/mac-arm64/云弹一下.app.zip
          retention-days: 90
      
      - name: Upload macOS dmg
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist-new/yundan-*.dmg
          retention-days: 90
