name: Setup and build
description: 安装 Node 20、恢复 node_modules 缓存、npm ci、编译 renderer/main/preload（build.yml 与 release.yml 四个构建 job 共用，改 Node 版本或缓存策略只改这里）

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'

    - name: Cache node_modules
      uses: actions/cache@v4
      with:
        path: node_modules
        key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-

    - name: Install dependencies
      run: npm ci
      shell: bash

    - name: 移除 .npmrc 国内镜像（CI 直连官方源）
      # npmmirror 的 electron-builder-binaries 代理会返回坏内容（NSIS 包 sha512 校验失败）。
      # 环境变量覆盖在 Windows 上不可靠：npm 会把 .npmrc 注入成小写 npm_config_* 环境变量，
      # 与大写覆盖变量在 Windows 大小写不敏感的环境里冲突。故直接删掉项目 .npmrc 里的镜像配置
      # （npm ci 已完成，不影响装依赖；只影响本次 CI，本地开发仍走镜像）。
      run: |
        npm config --location=project delete electron_mirror
        npm config --location=project delete electron_builder_binaries_mirror
      shell: bash

    - name: Build Vite and compile TypeScript
      run: npm run build:vite
      shell: bash
